<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pre-order-form</title>
    <link rel="stylesheet" href="style3.css">
    <link rel="icon" href="../assets/favicon.ico">
</head>
<body>
    <!-- Pre-Order-Form -->
     <section class="pre-order-form">
        <div class="form">
            <div class="header">
                <h1><b>Pre-Order Form</b></h1>
            </div>
            <hr><br>
            <div class="bg1">
                
                <label for="name" style="font-size: 20px;"><b>Name <span style="color: red;"><sup>*</sup></span></b></label><br><br>
                <input class="input" type="text" name="" id="" style="width: 304px;">
                <input class="input" type="text" style="width: 304px;">
                <input class="input" type="text" style="width: 305px;"><br>
                <label for="">First Name</label>
                <label style="margin-left: 240px; margin-right: 227px;" for="">Middle Name</label>
                <label for="">Last Name</label>
            </div> <br>
            <div class="bg2">
                <label for="" style="font-size: 20px;"><b>Contact Number <span style="color: red;"><sup>*</sup></span></b></label>
                <label for="" style="font-size: 20px; margin-left: 312px;"><b>Email <span style="color: red;"><sup>*</sup></span></b></label><br>
                <input class="input" type="number" style="width: 462px;" required placeholder="000-000-000">
                <input class="input" type="email" style="width: 462px;" required placeholder="myname@example.com">
                <label for="" style="margin-left: 470px;">example@example.com</label>
            </div><br>
            <div class="bg3">
                <label for="" style="font-size: 20px;"><b>Address <span style="color: red;"><sup>*</sup></span></b></label><br>
                <input class="input" style="width: 936px;" type="text"><br>
                <label for="">Street Address</label><br><br>
                   <input class="input" style="width: 936px;" type="text"><br>
                <label for="">Street Address Line 2</label><br><br>
                <input class="input" style="width: 462px;" type="text">
                <input class="input" style="width: 462px;" type="text"><br>
                <label for="">City</label>
                <label style="margin-left: 444px;" for="">State/Province</label><br><br>
                <input class="input" style="width: 936px;" type="text"><br>
                <label for="">Postal code/Zip Code</label><br>

            </div><br>
            <div class="bg4">
                <label for=""><b>Order Date & Time <span style="color: red;"><sup>*</sup></span></b></label> <br>

                <input class="input" style="width: 200px;" type="number">
                <input class="input" style="width: 75px;" type="number">
                <input class="input" style="width: 60px;" type="text"><br>
                <label for="">Date</label>
                <label style="margin-left: 175px;" for="">Hour Minutes</label>
            </div> <br>
            <div class="bg5">
                <p><b>Please select all your orders below.</b></p>
            </div>
                
            <div class="product1">
                <div>
                        <input type="checkbox">
                </div>

                <div class="ibgp1">
                        <img src="../assets/T-shirt.png" alt="T.shirt" style="width: 100px;">
                </div>
                <div>
                        <a href="https://">T-shirt</a>
                        <p>Enter description</p>
                        <label for="">Quantity</label>
                        <input class="input" style="width: 60px;" type="number">
                </div>
                <div style="width: 400px;">

                </div>
                <div>
                    <p>$10</p>
                </div>

            </div>
            <br>
        <div class="product2">
                <div>
                        <input type="checkbox">
                </div>

                <div class="ibgp2">
                        <img src="../assets/mask.jpeg" alt="mask" style="width: 70px; height: 70px;">
                </div>
                <div>
                        <a href="https://">Hygienic Set</a> <br>
                        <label for="">Product</label>
                        <input class="input" style="width: 120px;" type="text">
                        <label for="">Quantity</label>
                        <input class="input" style="width: 60px;" type="numer">
                </div>
                <div style="width: 250px;">

                </div>
                <div>
                    <p>$12</p>
                </div>

            </div>
            <br>
            <div class="product3">
                <div>
                        <input type="checkbox">
                </div>

                <div class="ibgp3">
                        <img src="../assets/food.jpeg" alt="food" style="width: 70px; height: 70px; border-radius: 100px;">
                </div>
                <div>
                        <a href="https://">Food</a> <br>

                </div>
                <div style="width: 500px;">

                </div>
                <div>
                    <p style="text-align: right;">$2</p>
                </div> 
                <br>
                

            </div>
                <div style="margin-right: 50px;">
                    <p style="text-align: right;">Total $22</p> 
                </div>
                <div style="padding-left: 4%; padding-right: 4%;">
                    <hr>
                </div>
            <div class="bg6">
                <label for=""> <b></b>Credit Card Details</label> <br><br>
                <input class="input" type="text" placeholder="First Name" style="width: 462px;">
                <input class="input" type="text" placeholder="Last Name" style="width: 462px;">
            </div>
            <br>
            
           <div class="bg7">
            <label for=""><b>If you have any additional notes about this order, please write.</b></label> <br><br>
           <textarea class="textarea" name="" id=""></textarea>
           </div>

           <hr>
           <br>

  <input class="button" type="button" value="Submit">
        </div>

     </section>
</body>
</html>
